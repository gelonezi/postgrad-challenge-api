name: Build and Tests CI

on:
  push:
    branches:
      - "main"
      - "feature/**"

jobs:
  build-and-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout do código
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v6.2.0

      - name: Setup .NET 10.0
        uses: actions/setup-dotnet@6bd8b7f7774af54e05809fcc5431931b3eb1ddee # v4.2.0
        with:
          dotnet-version: "10.0.x"

      - name: Restaurar pacotes
        run: dotnet restore Mecanica.Hermes.sln

      - name: Build
        run: dotnet build Mecanica.Hermes.sln --configuration Release --no-restore

      - name: Verificar Docker
        run: |
          docker --version
          docker ps

      - name: Instalar dependências auxiliares
        run: |
          dotnet tool install --global dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Executar testes (OpenCover via Coverlet Collector)
        run: |
          dotnet test Mecanica.Hermes.sln \
            -c Release \
            --logger:"console;verbosity=normal" \
            --collect:"XPlat Code Coverage" \
            -- DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Format=opencover \
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.ExcludeByFile="**/Migrations/*.cs" \
            DataCollectionRunSettings.DataCollectors.DataCollector.Configuration.Exclude="[*]*.Migrations.*"
        env:
          DOCKER_HOST: unix:///var/run/docker.sock
          TESTCONTAINERS_RYUK_DISABLED: false
          TESTCONTAINERS_HUB_IMAGE_NAME_PREFIX: ""

      - name: Listar arquivos de cobertura gerados
        run: |
          echo "Procurando arquivos de cobertura..."
          find . -name "coverage.opencover.xml" -o -name "*.opencover.xml" || true
          echo "Estrutura de TestResults:"
          find . -type d -name "TestResults" -exec ls -la {} \; || true

      - name: Gerar relatório HTML
        run: |
          reportgenerator \
            -reports:"**/TestResults/**/coverage.opencover.xml" \
            -targetdir:"coverage-report" \
            -reporttypes:"Html;JsonSummary" \
            -filefilters:"-*.g.cs;-*Designer.cs;-*Migrations/*.cs" \
            -title:"Cobertura de Testes"

      - name: Publicar artefato de cobertura HTML
        uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v6.0.0
        with:
          name: cobertura-html
          path: coverage-report
          if-no-files-found: error
          retention-days: 7

      - name: Verificar threshold de cobertura (>=70% line)
        shell: bash
        run: |
          if [ ! -f coverage-report/Summary.json ]; then
            echo "Summary.json não encontrado. Falhando." >&2
            exit 1
          fi
          LINE=$(jq -r '.summary.linecoverage // 0' coverage-report/Summary.json)
          BRANCH=$(jq -r '.summary.branchcoverage // 0' coverage-report/Summary.json)
          echo "Line Coverage: ${LINE}%"
          echo "Branch Coverage: ${BRANCH}%"
          THRESHOLD=70
          awk -v cov="$LINE" -v thr="$THRESHOLD" 'BEGIN { exit (cov+0 < thr) ? 1 : 0 }'
          echo "Cobertura mínima de linhas atendida (>= ${THRESHOLD}%)."
